<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>D'OH!</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #FFD700;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: 'Impact', sans-serif;
    overflow: hidden;
  }
  h1 {
    font-size: 80px;
    color: #00A8E0;
    text-shadow: 4px 4px 0px #FF6600;
    animation: bounce 0.5s infinite alternate;
    letter-spacing: 8px;
  }
  p {
    font-size: 24px;
    color: #FF3300;
    margin-top: 20px;
    text-shadow: 2px 2px 0 #000;
  }
  @keyframes bounce {
    from { transform: scale(1); }
    to { transform: scale(1.08); }
  }
  .popup-window {
    position: fixed;
    background: white;
    border: 3px solid #000;
    border-radius: 6px;
    box-shadow: 4px 4px 0 #000;
    width: 260px;
    cursor: move;
    animation: popIn 0.3s cubic-bezier(0.175,0.885,0.32,1.275) both;
    z-index: 999;
    user-select: none;
  }
  @keyframes popIn {
    from { transform: scale(0) rotate(-10deg); opacity: 0; }
    to   { transform: scale(1) rotate(0deg);  opacity: 1; }
  }
  .popup-titlebar {
    background: linear-gradient(to right, #000080, #1084d0);
    color: white;
    font-family: 'Arial', sans-serif;
    font-size: 12px;
    font-weight: bold;
    padding: 4px 6px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-radius: 3px 3px 0 0;
    cursor: move;
  }
  .popup-close {
    background: #c0c0c0;
    border: 1px solid #888;
    color: black;
    font-size: 11px;
    font-weight: bold;
    width: 16px;
    height: 14px;
    cursor: pointer;
    border-radius: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  .popup-close:hover { background: #ff4444; color: white; }
  .popup-body {
    padding: 6px;
    text-align: center;
    background: #c0c0c0;
  }
  .popup-body img {
    width: 100%;
    border: 2px inset #888;
    display: block;
  }
  .popup-msg {
    font-family: 'Arial', sans-serif;
    font-size: 13px;
    font-weight: bold;
    margin-top: 5px;
    color: #000;
  }
  #counter {
    display: none;
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #FF3300;
    color: white;
    font-size: 22px;
    font-weight: bold;
    padding: 10px 20px;
    border-radius: 8px;
    border: 3px solid #000;
    font-family: Impact, sans-serif;
    letter-spacing: 2px;
    z-index: 9999;
  }
  #btn {
    margin-top: 30px;
    padding: 14px 36px;
    font-size: 26px;
    font-family: Impact, sans-serif;
    background: #FF3300;
    color: white;
    border: 4px solid #000;
    border-radius: 8px;
    cursor: pointer;
    letter-spacing: 3px;
    box-shadow: 4px 4px 0 #000;
    transition: transform 0.1s;
  }
  #btn:active { transform: scale(0.95) translate(2px,2px); box-shadow: 2px 2px 0 #000; }
  #btn:hover { background: #cc0000; }

  #crash {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: #0000AA;
  color: white;
  font-family: 'Courier New', monospace;
  z-index: 99999;
}
#crash h2 { font-size: 36px; margin-bottom: 30px; }
#crash p  { font-size: 18px; line-height: 2; }

#donut {
  font-size: 120px;
  cursor: pointer;
  transition: transform 0.2s, filter 0.2s;
  user-select: none;
}
#donut:hover {
  transform: scale(1.5);
  filter: drop-shadow(0 0 20px #FF6600);
}
@keyframes explode {
  0%   { transform: scale(1);   opacity: 1; }
  50%  { transform: scale(3);   opacity: 0.8; filter: brightness(3); }
  100% { transform: scale(8);   opacity: 0; }
}
.exploding {
  animation: explode 0.6s forwards;
}

</style>
</head>
<body>

<div id="donut" onclick="triggerDonut()">
  <img src="donut.png" style="width:200px;height:200px;object-fit:contain;">
</div>

<div id="counter">Homers: 0</div>

<script>
const GIFS = [
  'https://media.giphy.com/media/jUwpNzg9IcyrK/giphy.gif',  // Homer into da bush
  'https://media.giphy.com/media/Zk9mW5OmXTz9e/giphy.gif',  // Homer drooling
  'https://media.giphy.com/media/xT5LMpBWU96Yivdfeo/giphy.gif',  // Homer mmm donuts
  'https://media.giphy.com/media/R3tHUypTIfmFi/giphy.gif',  // Homer spidery pig
  'https://media.giphy.com/media/CgKFTMMFDESNW/giphy.gif',  // Homer firbidden bear
  'https://media.giphy.com/media/Za7ZWOU0su5BC/giphy.gif',  // Treadmil sitting
];

const MESSAGES = [
  "Mmmmm... donuts 🍩",
  "D'OH!",
  "Why you little—!",
  "Mmmm... sacrilicious",
  "To alcohol! The cause of,\nand solution to,\nall of life's problems.",
  "Homer no function beer well without.",
  "Maybe, just once, someone will call me 'Sir'\nwithout adding,\n'you're making a scene.'",
  "D'OHHHHH!",
  "Bart, with $10,000 we'd be\nmillionaires!",
  "I'm normally not a praying man,\nbut if you're up there...",
]

function playDoh() {
  const audio = new Audio('doh.wav');
  audio.play();
}
function playCooked() {
  const audio = new Audio('crash.wav');
  audio.play();
}
function playNoise() {
  const audio = new Audio('noise.wav');
  audio.play();
}

let count = 0;
let interval = null;
let running = false;
let popups = [];
let dragTarget = null, dragOffX = 0, dragOffY = 0;
let delay = 400;
let crashPending = false;

document.addEventListener('mousemove', e => {
  if (dragTarget) {
    dragTarget.style.left = (e.clientX - dragOffX) + 'px';
    dragTarget.style.top  = (e.clientY - dragOffY) + 'px';
  }
});
document.addEventListener('mouseup', () => { dragTarget = null; });

function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

function makePopup() {
  count++;
  document.getElementById('counter').textContent = 'Homers: ' + count;

  const gif = GIFS[rand(0, GIFS.length - 1)];
  const msg = MESSAGES[rand(0, MESSAGES.length - 1)];

  const win = document.createElement('div');
  win.className = 'popup-window';
  win.style.left = rand(0, window.innerWidth - 280) + 'px';
  win.style.top  = rand(0, window.innerHeight - 280) + 'px';
  win.style.transform = `rotate(${rand(-8, 8)}deg)`;
  win.style.zIndex = 1000 + count;

  win.innerHTML = ` 
    <div class="popup-titlebar" title="drag me">
      <span>🍩 Homer.exe #${count}</span>
      <div class="popup-close" title="close">✕</div>
    </div>
    <div class="popup-body">
      <img src="${gif}" alt="Homer" loading="lazy">
      <div class="popup-msg">${msg.replace(/\n/g,'<br>')}</div>
    </div>
  `;

  // Drag
  const titlebar = win.querySelector('.popup-titlebar');
  titlebar.addEventListener('mousedown', e => {
    dragTarget = win;
    dragOffX = e.clientX - win.offsetLeft;
    dragOffY = e.clientY - win.offsetTop;
    win.style.zIndex = 2000 + count;
    e.preventDefault();
  });

  // Close button
  win.querySelector('.popup-close').addEventListener('click', e => {
    e.stopPropagation();
    win.style.animation = 'popIn 0.2s reverse forwards';
    setTimeout(() => win.remove(), 200);
  });

  document.body.appendChild(win);
  popups.push(win);
  playCooked();


}

function triggerCrash() {
  playNoise();
  running = false;
  clearTimeout(interval);
  

  document.body.style.background = '#000';
  document.querySelectorAll('body > *').forEach(el => el.style.visibility = 'hidden');

  setTimeout(function() {
    playDoh();
    const crash = document.getElementById('crash');
    crash.style.visibility = 'visible'; 
    crash.style.display = 'block';
  }, 3000);
}

function scheduleNext() {
  if (!running) return;
  interval = setTimeout(function() {
    makePopup();
    delay = Math.max(30, delay * 0.92);
    if (delay <= 30 && !crashPending) {
      crashPending = true;
      setTimeout(triggerCrash, 2000);
    }
    scheduleNext();
  }, delay);
}

function triggerDonut() {
  const donut = document.getElementById('donut');
  donut.classList.add('exploding');

  // Go fullscreen on the click
  const el = document.documentElement;
  if (el.requestFullscreen) el.requestFullscreen();
  else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  else if (el.msRequestFullscreen) el.msRequestFullscreen();

  setTimeout(function() {
    donut.style.display = 'none';
    // hide the h1 and p too
    document.getElementById('counter').style.display = 'block';
    // start chaos
    running = true;
    makePopup();
    scheduleNext();
  }, 600);
}
</script>
<div id="crash">
  <img id="crash-img" src="BSOD.png" style="width:100%;height:100%;object-fit:cover;display:block;">
  <p id="crash-counter" style="position:fixed;bottom:60px;left:60px;color:white;font-family:'Segoe UI',sans-serif;font-size:22px;"></p>
</div>
</body>
</html>
