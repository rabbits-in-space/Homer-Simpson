<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>D'OH!</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #FFD700;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: 'Impact', sans-serif;
    overflow: hidden;
  }
  h1 {
    font-size: 80px;
    color: #00A8E0;
    text-shadow: 4px 4px 0px #FF6600;
    animation: bounce 0.5s infinite alternate;
    letter-spacing: 8px;
  }
  p {
    font-size: 24px;
    color: #FF3300;
    margin-top: 20px;
    text-shadow: 2px 2px 0 #000;
  }
  @keyframes bounce {
    from { transform: scale(1); }
    to { transform: scale(1.08); }
  }
  .homer-float {
    position: fixed;
    width: 120px;
    height: 120px;
    pointer-events: none;
    animation: floatAround 3s linear infinite;
    border-radius: 50%;
    background: url('https://media.giphy.com/media/13d2jHlSlxklVe/giphy.gif') center/cover;
    border: 4px solid #FF6600;
    box-shadow: 0 0 20px #FF000088;
  }
  @keyframes floatAround {
    0%   { transform: translate(0,0) rotate(0deg); }
    25%  { transform: translate(30px,-40px) rotate(90deg); }
    50%  { transform: translate(-20px,20px) rotate(180deg); }
    75%  { transform: translate(40px,10px) rotate(270deg); }
    100% { transform: translate(0,0) rotate(360deg); }
  }
  .popup-window {
    position: fixed;
    background: white;
    border: 3px solid #000;
    border-radius: 6px;
    box-shadow: 4px 4px 0 #000;
    width: 260px;
    cursor: move;
    animation: popIn 0.3s cubic-bezier(0.175,0.885,0.32,1.275) both;
    z-index: 999;
    user-select: none;
  }
  @keyframes popIn {
    from { transform: scale(0) rotate(-10deg); opacity: 0; }
    to   { transform: scale(1) rotate(0deg);  opacity: 1; }
  }
  .popup-titlebar {
    background: linear-gradient(to right, #000080, #1084d0);
    color: white;
    font-family: 'Arial', sans-serif;
    font-size: 12px;
    font-weight: bold;
    padding: 4px 6px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-radius: 3px 3px 0 0;
    cursor: move;
  }
  .popup-close {
    background: #c0c0c0;
    border: 1px solid #888;
    color: black;
    font-size: 11px;
    font-weight: bold;
    width: 16px;
    height: 14px;
    cursor: pointer;
    border-radius: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  .popup-close:hover { background: #ff4444; color: white; }
  .popup-body {
    padding: 6px;
    text-align: center;
    background: #c0c0c0;
  }
  .popup-body img {
    width: 100%;
    border: 2px inset #888;
    display: block;
  }
  .popup-msg {
    font-family: 'Arial', sans-serif;
    font-size: 13px;
    font-weight: bold;
    margin-top: 5px;
    color: #000;
  }
  #counter {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #FF3300;
    color: white;
    font-size: 22px;
    font-weight: bold;
    padding: 10px 20px;
    border-radius: 8px;
    border: 3px solid #000;
    font-family: Impact, sans-serif;
    letter-spacing: 2px;
    z-index: 9999;
  }
  #btn {
    margin-top: 30px;
    padding: 14px 36px;
    font-size: 26px;
    font-family: Impact, sans-serif;
    background: #FF3300;
    color: white;
    border: 4px solid #000;
    border-radius: 8px;
    cursor: pointer;
    letter-spacing: 3px;
    box-shadow: 4px 4px 0 #000;
    transition: transform 0.1s;
  }
  #crash {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: #0000AA;
  color: white;
  font-family: 'Courier New', monospace;
  z-index: 99999;
}
#crash h2 { font-size: 36px; margin-bottom: 30px; }
#crash p  { font-size: 18px; line-height: 2; }
  #btn:active { transform: scale(0.95) translate(2px,2px); box-shadow: 2px 2px 0 #000; }
  #btn:hover { background: #cc0000; }
</style>
</head>
<body>

<h1>D'OH!</h1>
<p>Homer is everywhere. You cannot stop him.</p>
<button id="btn" onclick="toggleChaos()">🍩 UNLEASH HOMER 🍩</button>

<div id="counter">Homers: 0</div>

<script>
const GIFS = [
  'https://media.giphy.com/media/jUwpNzg9IcyrK/giphy.gif',  // Homer into da bush
  'https://media.giphy.com/media/Zk9mW5OmXTz9e/giphy.gif',  // Homer drooling
  'https://media.giphy.com/media/xT5LMpBWU96Yivdfeo/giphy.gif',  // Homer mmm donuts
  'https://media.giphy.com/media/R3tHUypTIfmFi/giphy.gif',  // Homer spidery pig
  'https://media.giphy.com/media/CgKFTMMFDESNW/giphy.gif',  // Homer firbidden bear
  'https://media.giphy.com/media/Za7ZWOU0su5BC/giphy.gif',  // Treadmil sitting
];

const MESSAGES = [
  "Mmmmm... donuts 🍩",
  "D'OH!",
  "Why you little—!",
  "Mmmm... sacrilicious",
  "To alcohol! The cause of,\nand solution to,\nall of life's problems.",
  "Homer no function beer well without.",
  "Maybe, just once, someone will call me 'Sir'\nwithout adding,\n'you're making a scene.'",
  "D'OHHHHH!",
  "Bart, with $10,000 we'd be\nmillionaires!",
  "I'm normally not a praying man,\nbut if you're up there...",
];

function playDoh() {
  const audio = new Audio('crash.wav');
  audio.play();
}
function playCooked() {
  const AuDiO = new Audio('doh.wav');
}

let count = 0;
let interval = null;
let running = false;
let popups = [];
let dragTarget = null, dragOffX = 0, dragOffY = 0;
let delay = 600;

document.addEventListener('mousemove', e => {
  if (dragTarget) {
    dragTarget.style.left = (e.clientX - dragOffX) + 'px';
    dragTarget.style.top  = (e.clientY - dragOffY) + 'px';
  }
});
document.addEventListener('mouseup', () => { dragTarget = null; });

function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

function makePopup() {
  count++;
  document.getElementById('counter').textContent = 'Homers: ' + count;

  const gif = GIFS[rand(0, GIFS.length - 1)];
  const msg = MESSAGES[rand(0, MESSAGES.length - 1)];

  const win = document.createElement('div');
  win.className = 'popup-window';
  win.style.left = rand(0, window.innerWidth - 280) + 'px';
  win.style.top  = rand(0, window.innerHeight - 280) + 'px';
  win.style.transform = `rotate(${rand(-8, 8)}deg)`;
  win.style.zIndex = 1000 + count;

  win.innerHTML = `
    <div class="popup-titlebar" title="drag me">
      <span>🍩 Homer.exe #${count}</span>
      <div class="popup-close" title="close">✕</div>
    </div>
    <div class="popup-body">
      <img src="${gif}" alt="Homer" loading="lazy">
      <div class="popup-msg">${msg.replace(/\n/g,'<br>')}</div>
    </div>
  `;

  // Drag
  const titlebar = win.querySelector('.popup-titlebar');
  titlebar.addEventListener('mousedown', e => {
    dragTarget = win;
    dragOffX = e.clientX - win.offsetLeft;
    dragOffY = e.clientY - win.offsetTop;
    win.style.zIndex = 2000 + count;
    e.preventDefault();
  });

  // Close button
  win.querySelector('.popup-close').addEventListener('click', e => {
    e.stopPropagation();
    win.style.animation = 'popIn 0.2s reverse forwards';
    setTimeout(() => win.remove(), 200);
  });

  document.body.appendChild(win);
  popups.push(win);
  playDoh();


}

// Floating Homers on the main screen
for (let i = 0; i < 4; i++) {
  const h = document.createElement('div');
  h.className = 'homer-float';
  h.style.left = rand(5, 80) + '%';
  h.style.top  = rand(5, 80) + '%';
  h.style.animationDuration = rand(2, 5) + 's';
  h.style.animationDelay   = rand(0, 3) + 's';
  h.style.width  = rand(80, 150) + 'px';
  h.style.height = h.style.width;
  document.body.appendChild(h);
}

function triggerCrash() {
  playCooked();
  running = false;
  clearTimeout(interval);
  document.getElementById('crash').style.display = 'block';
}

function scheduleNext() {
  if (!running) return;
  interval = setTimeout(function() {
    makePopup();
    delay = Math.max(60, delay * 0.92);
    if (delay <= 60) {
      triggerCrash();  // 💥 crash when limit is hit
      return;
    }
    scheduleNext();
  }, delay);
}

function toggleChaos() {
  if (!running) {
    running = true;
    delay = 2000;  // resets to slow on each fresh start
    document.getElementById('btn').textContent = '🛑 STOP THE MADNESS 🛑';
    document.getElementById('btn').style.background = '#006600';
    makePopup();
    scheduleNext();
  } else {
    running = false;
    clearTimeout(interval);
    document.getElementById('btn').textContent = '🍩 UNLEASH HOMER 🍩';
    document.getElementById('btn').style.background = '#FF3300';
  }
}
</script>
<div id="crash">
  <img id="crash-img" src="BSOD.png" style="width:100%;height:100%;object-fit:cover;display:block;">
  <p id="crash-counter" style="position:fixed;bottom:60px;left:60px;color:white;font-family:'Segoe UI',sans-serif;font-size:22px;"></p>
</div>
</body>
</html>
