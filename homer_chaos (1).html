<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>D'OH!</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #FFD700;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: 'Impact', sans-serif;
    overflow: hidden;
  }
  h1 {
    font-size: 80px;
    color: #00A8E0;
    text-shadow: 4px 4px 0px #FF6600;
    animation: bounce 0.5s infinite alternate;
    letter-spacing: 8px;
  }
  p {
    font-size: 24px;
    color: #FF3300;
    margin-top: 20px;
    text-shadow: 2px 2px 0 #000;
  }
  @keyframes bounce {
    from { transform: scale(1); }
    to { transform: scale(1.08); }
  }
  .homer-float {
    position: fixed;
    width: 120px;
    height: 120px;
    pointer-events: none;
    animation: floatAround 3s linear infinite;
    border-radius: 50%;
    background: url('https://media.giphy.com/media/13d2jHlSlxklVe/giphy.gif') center/cover;
    border: 4px solid #FF6600;
    box-shadow: 0 0 20px #FF000088;
  }
  @keyframes floatAround {
    0%   { transform: translate(0,0) rotate(0deg); }
    25%  { transform: translate(30px,-40px) rotate(90deg); }
    50%  { transform: translate(-20px,20px) rotate(180deg); }
    75%  { transform: translate(40px,10px) rotate(270deg); }
    100% { transform: translate(0,0) rotate(360deg); }
  }
  .popup-window {
    position: fixed;
    background: white;
    border: 3px solid #000;
    border-radius: 6px;
    box-shadow: 4px 4px 0 #000;
    width: 260px;
    cursor: move;
    animation: popIn 0.3s cubic-bezier(0.175,0.885,0.32,1.275) both;
    z-index: 999;
    user-select: none;
  }
  @keyframes popIn {
    from { transform: scale(0) rotate(-10deg); opacity: 0; }
    to   { transform: scale(1) rotate(0deg);  opacity: 1; }
  }
  .popup-titlebar {
    background: linear-gradient(to right, #000080, #1084d0);
    color: white;
    font-family: 'Arial', sans-serif;
    font-size: 12px;
    font-weight: bold;
    padding: 4px 6px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-radius: 3px 3px 0 0;
    cursor: move;
  }
  .popup-close {
    background: #c0c0c0;
    border: 1px solid #888;
    color: black;
    font-size: 11px;
    font-weight: bold;
    width: 16px;
    height: 14px;
    cursor: pointer;
    border-radius: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  .popup-close:hover { background: #ff4444; color: white; }
  .popup-body {
    padding: 6px;
    text-align: center;
    background: #c0c0c0;
  }
  .popup-body img {
    width: 100%;
    border: 2px inset #888;
    display: block;
  }
  .popup-msg {
    font-family: 'Arial', sans-serif;
    font-size: 13px;
    font-weight: bold;
    margin-top: 5px;
    color: #000;
  }
  #counter {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #FF3300;
    color: white;
    font-size: 22px;
    font-weight: bold;
    padding: 10px 20px;
    border-radius: 8px;
    border: 3px solid #000;
    font-family: Impact, sans-serif;
    letter-spacing: 2px;
    z-index: 9999;
  }
  #btn {
    margin-top: 30px;
    padding: 14px 36px;
    font-size: 26px;
    font-family: Impact, sans-serif;
    background: #FF3300;
    color: white;
    border: 4px solid #000;
    border-radius: 8px;
    cursor: pointer;
    letter-spacing: 3px;
    box-shadow: 4px 4px 0 #000;
    transition: transform 0.1s;
  }
  #btn:active { transform: scale(0.95) translate(2px,2px); box-shadow: 2px 2px 0 #000; }
  #btn:hover { background: #cc0000; }
</style>
</head>
<body>

<h1>D'OH!</h1>
<p>Homer is everywhere. You cannot stop him.</p>
<button id="btn" onclick="toggleChaos()">🍩 UNLEASH HOMER 🍩</button>

<div id="counter">Homers: 0</div>

<script>
const GIFS = [
  'https://media.giphy.com/media/13d2jHlSlxklVe/giphy.gif',   // Homer doh
  'https://media.giphy.com/media/xT5LMHxhOfscxPfIfm/giphy.gif', // Homer drooling
  'https://media.giphy.com/media/3oriO6qJiXajN0TovC/giphy.gif', // Homer mmm donuts
  'https://media.giphy.com/media/l3q2K5jinAlChoCLS/giphy.gif',  // Homer backing into bush
  'https://media.giphy.com/media/IgLbJbzpxuRiQ/giphy.gif',     // Homer mmm beer
  'https://media.giphy.com/media/8PBjqMFSg4OITM2lBs/giphy.gif',// Homer dancing
];

const MESSAGES = [
  "Mmmmm... donuts 🍩",
  "D'OH!",
  "Why you little—!",
  "Mmmm... sacrilicious",
  "To alcohol! The cause of,\nand solution to,\nall of life's problems.",
  "Homer no function beer well without.",
  "Maybe, just once, someone will call me 'Sir'\nwithout adding,\n'you're making a scene.'",
  "D'OHHHHH!",
  "Bart, with $10,000 we'd be\nmillionaires!",
  "I'm normally not a praying man,\nbut if you're up there...",
];

const SOUNDS = [
  'https://www.soundboard.com/handler/DownLoadTrack.ashx?cliptitle=Homer+Doh&filename=mz/Mzg1ODMxNTIzMzg1ODMx.mp3',
];

// Use AudioContext with a simple "doh" beep since external audio might be blocked
let audioCtx;
function playDoh() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    // Simulate a "doh" with oscillators
    const patterns = [
      [{ f: 380, t: 0,    d: 0.12 },
       { f: 320, t: 0.1,  d: 0.12 },
       { f: 260, t: 0.2,  d: 0.18 },
       { f: 200, t: 0.33, d: 0.25 }],
      [{ f: 440, t: 0,    d: 0.08 },
       { f: 380, t: 0.07, d: 0.08 },
       { f: 300, t: 0.14, d: 0.15 },
       { f: 180, t: 0.28, d: 0.3  }],
      [{ f: 500, t: 0,    d: 0.07 },
       { f: 420, t: 0.06, d: 0.10 },
       { f: 340, t: 0.15, d: 0.15 },
       { f: 220, t: 0.29, d: 0.28 }],
    ];
    const pat = patterns[Math.floor(Math.random() * patterns.length)];
    const now = audioCtx.currentTime;
    pat.forEach(({ f, t, d }) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(f, now + t);
      osc.frequency.exponentialRampToValueAtTime(f * 0.6, now + t + d);
      gain.gain.setValueAtTime(0.38, now + t);
      gain.gain.exponentialRampToValueAtTime(0.001, now + t + d + 0.05);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(now + t);
      osc.stop(now + t + d + 0.1);
    });
  } catch(e) {}
}

let count = 0;
let interval = null;
let running = false;
let popups = [];
let dragTarget = null, dragOffX = 0, dragOffY = 0;

document.addEventListener('mousemove', e => {
  if (dragTarget) {
    dragTarget.style.left = (e.clientX - dragOffX) + 'px';
    dragTarget.style.top  = (e.clientY - dragOffY) + 'px';
  }
});
document.addEventListener('mouseup', () => { dragTarget = null; });

function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

function makePopup() {
  count++;
  document.getElementById('counter').textContent = 'Homers: ' + count;

  const gif = GIFS[rand(0, GIFS.length - 1)];
  const msg = MESSAGES[rand(0, MESSAGES.length - 1)];

  const win = document.createElement('div');
  win.className = 'popup-window';
  win.style.left = rand(0, window.innerWidth - 280) + 'px';
  win.style.top  = rand(0, window.innerHeight - 280) + 'px';
  win.style.transform = `rotate(${rand(-8, 8)}deg)`;
  win.style.zIndex = 1000 + count;

  win.innerHTML = `
    <div class="popup-titlebar" title="drag me">
      <span>🍩 Homer Alert #${count}</span>
      <div class="popup-close" title="close">✕</div>
    </div>
    <div class="popup-body">
      <img src="${gif}" alt="Homer" loading="lazy">
      <div class="popup-msg">${msg.replace(/\n/g,'<br>')}</div>
    </div>
  `;

  // Drag
  const titlebar = win.querySelector('.popup-titlebar');
  titlebar.addEventListener('mousedown', e => {
    dragTarget = win;
    dragOffX = e.clientX - win.offsetLeft;
    dragOffY = e.clientY - win.offsetTop;
    win.style.zIndex = 2000 + count;
    e.preventDefault();
  });

  // Close button
  win.querySelector('.popup-close').addEventListener('click', e => {
    e.stopPropagation();
    win.style.animation = 'popIn 0.2s reverse forwards';
    setTimeout(() => win.remove(), 200);
  });

  document.body.appendChild(win);
  popups.push(win);
  playDoh();

  // Keep max ~60 windows so browser doesn't melt
  if (popups.length > 60) {
    const old = popups.shift();
    if (old && old.parentNode) old.remove();
  }
}

// Floating Homers on the main screen
for (let i = 0; i < 4; i++) {
  const h = document.createElement('div');
  h.className = 'homer-float';
  h.style.left = rand(5, 80) + '%';
  h.style.top  = rand(5, 80) + '%';
  h.style.animationDuration = rand(2, 5) + 's';
  h.style.animationDelay   = rand(0, 3) + 's';
  h.style.width  = rand(80, 150) + 'px';
  h.style.height = h.style.width;
  document.body.appendChild(h);
}

function toggleChaos() {
  if (!running) {
    running = true;
    document.getElementById('btn').textContent = '🛑 STOP THE MADNESS 🛑';
    document.getElementById('btn').style.background = '#006600';
    // Pop one immediately, then keep going
    makePopup();
    interval = setInterval(makePopup, 600);
  } else {
    running = false;
    clearInterval(interval);
    document.getElementById('btn').textContent = '🍩 UNLEASH HOMER 🍩';
    document.getElementById('btn').style.background = '#FF3300';
  }
}
</script>
</body>
</html>
